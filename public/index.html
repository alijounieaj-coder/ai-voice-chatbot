<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AI Voice Assistant</title>
  <!-- face-api.js for mouth landmark detection -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:     #0a0a14;
      --bg-card:     rgba(255,255,255,0.05);
      --border:      rgba(255,255,255,0.09);
      --primary:     #6c63ff;
      --primary-glow:#6c63ff44;
      --green:       #00e676;
      --green-glow:  #00e67650;
      --amber:       #ffa726;
      --amber-glow:  #ffa72650;
      --blue:        #29b6f6;
      --blue-glow:   #29b6f650;
      --text:        #e8e8f0;
      --text-dim:    #7777aa;
      --radius:      16px;
      --tr:          0.25s ease;
    }

    html, body {
      height: 100%; width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
      margin: 0; padding: 0;
    }

    /* Ambient gradient */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%,   rgba(108,99,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%,  rgba(0,230,118,0.05)  0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    /* ── App shell ───────────────────────────────────────── */
    #app {
      position: fixed;         /* most reliable mobile full-screen approach */
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 10;
    }
    #header h1 { font-size: 16px; font-weight: 600; }

    #lang-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      padding: 3px 10px; border-radius: 20px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-dim); transition: var(--tr); text-transform: uppercase;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    #lang-badge:active { opacity: 0.7; }
    #lang-badge.ar { color: var(--amber); border-color: var(--amber-glow); }
    #lang-badge.en { color: var(--blue);  border-color: var(--blue-glow);  }

    /* ── Status pill ─────────────────────────────────────── */
    #status-bar { display:flex; justify-content:center; padding: 8px 0; flex-shrink:0; }
    #status-pill {
      display:flex; align-items:center; gap:7px;
      padding: 5px 14px; border-radius:20px;
      border: 1px solid var(--border); background: var(--bg-card);
      font-size: 12px; font-weight:500; color: var(--text-dim);
      transition: var(--tr);
    }
    #status-dot {
      width:7px; height:7px; border-radius:50%;
      background: var(--text-dim); transition: background var(--tr); flex-shrink:0;
    }
    #status-pill.listening { color:var(--green); border-color:var(--green-glow); }
    #status-pill.listening #status-dot { background:var(--green); animation:blink 1s infinite; }
    #status-pill.thinking  { color:var(--blue);  border-color:var(--blue-glow);  }
    #status-pill.thinking  #status-dot { background:var(--blue);  animation:spin 1.2s linear infinite; }
    #status-pill.speaking  { color:var(--amber); border-color:var(--amber-glow); }
    #status-pill.speaking  #status-dot { background:var(--amber); animation:blink 0.6s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    /* ── Avatar section ──────────────────────────────────── */
    #avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 0 8px;
      flex-shrink: 0;
      gap: 8px;
    }

    /* Ring wrapper — CSS animations live here */
    #avatar-ring {
      position: relative;
      width: 140px; height: 190px;
      border-radius: 14px;
      transition: var(--tr);
    }

    /* Outer pulse rings (absolutely positioned) */
    .a-ring {
      position: absolute; border-radius: 18px;
      border: 2px solid transparent;
      opacity: 0; pointer-events: none;
      transition: border-color 0.3s, opacity 0.3s;
    }
    .a-ring-1 { inset: -9px; }
    .a-ring-2 { inset: -20px; }
    .a-ring-3 { inset: -33px; }

    /* Listening — green rings */
    #avatar-ring.listening .a-ring { border-color: var(--green); opacity: 0.5; animation: av-pulse 1.6s ease-out infinite; }
    #avatar-ring.listening .a-ring-1 { animation-delay: 0s; }
    #avatar-ring.listening .a-ring-2 { animation-delay: 0.3s; }
    #avatar-ring.listening .a-ring-3 { animation-delay: 0.6s; }

    /* Thinking — rotating blue ring */
    #avatar-ring.thinking .a-ring-1 {
      border-color: var(--blue); opacity: 0.7;
      border-top-color: transparent; border-right-color: transparent;
      animation: av-spin 1.2s linear infinite;
    }

    /* Speaking — amber glow, ring pulses fast */
    #avatar-ring.speaking .a-ring-1 { border-color: var(--amber); opacity: 0.6; animation: av-pulse 0.5s ease-out infinite; }
    #avatar-ring.speaking .a-ring-2 { border-color: var(--amber); opacity: 0.3; animation: av-pulse 0.5s ease-out 0.15s infinite; }

    @keyframes av-pulse {
      0%   { transform: scale(0.95); opacity: 0.55; }
      100% { transform: scale(1.08); opacity: 0; }
    }
    @keyframes av-spin { to { transform: rotate(360deg); } }

    /* Canvas itself */
    #avatar-canvas {
      display: block;
      width: 140px; height: 190px;
      border-radius: 14px;
      border: 2px solid var(--border);
      transition: border-color var(--tr), box-shadow var(--tr);
      background: var(--bg-card);
      cursor: pointer;
    }
    #avatar-ring.listening #avatar-canvas { border-color: var(--green); box-shadow: 0 0 18px var(--green-glow); }
    #avatar-ring.thinking  #avatar-canvas { border-color: var(--blue);  box-shadow: 0 0 18px var(--blue-glow);  }
    #avatar-ring.speaking  #avatar-canvas { border-color: var(--amber); box-shadow: 0 0 22px var(--amber-glow); }

    /* Photo upload overlay — shown only when no photo */
    #photo-overlay {
      position: absolute; inset: 0;
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; cursor: pointer;
      background: var(--bg-card);
      transition: background var(--tr);
    }
    #photo-overlay:hover, #photo-overlay:active { background: rgba(108,99,255,0.12); }
    #photo-overlay .icon { font-size: 28px; }
    #photo-overlay .label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
    #photo-overlay.hidden { display: none; }

    /* Change photo button — shown after upload */
    #change-photo-btn {
      position: absolute; bottom: 4px; right: 4px;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(10,10,20,0.9);
      color: var(--text-dim); font-size: 14px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #change-photo-btn.visible { display: flex; }

    /* ── Error banner ─────────────────────────────────────── */
    #error-banner {
      background: #d32f2f44; border: 1px solid #d32f2f99;
      color: #ffcdd2; font-size: 14px; font-weight: 500;
      padding: 12px 16px; margin: 0 12px 6px; border-radius: 10px;
      display: none; flex-shrink: 0; text-align: center;
    }

    /* ── Transcript ───────────────────────────────────────── */
    #transcript {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 10px 14px; display: flex; flex-direction: column;
      gap: 8px; scroll-behavior: smooth;
    }
    #transcript::-webkit-scrollbar { width: 3px; }
    #transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display:flex; flex-direction:column; max-width:82%; animation:fadeUp 0.2s ease; }
    .msg.user  { align-self:flex-end;   align-items:flex-end;   }
    .msg.ai    { align-self:flex-start; align-items:flex-start; }
    .msg-label { font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-dim); margin-bottom:3px; padding:0 4px; }
    .bubble { padding:9px 13px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-word; }
    .msg.user .bubble { background:var(--primary); color:#fff; border-bottom-right-radius:4px; }
    .msg.ai   .bubble { background:var(--bg-card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
    .bubble[dir="rtl"] { text-align:right; font-size:15px; }

    #interim-msg {
      align-self:flex-end; max-width:82%;
      padding:7px 13px; border-radius:18px 18px 4px 18px;
      background:rgba(108,99,255,0.12); border:1px dashed rgba(108,99,255,0.35);
      color:rgba(255,255,255,0.45); font-size:13px; font-style:italic; display:none;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ── Transcript min-height guard ─────────────────────── */
    #transcript { min-height: 80px; }

    /* ── Compact avatar on short screens ─────────────────── */
    @media (max-height: 700px) {
      #avatar-ring    { width: 90px; height: 124px; border-radius: 10px; }
      #avatar-canvas  { width: 90px; height: 124px; border-radius: 10px; }
      #photo-overlay  { border-radius: 10px; }
      .a-ring         { border-radius: 13px; }
      #avatar-section { padding: 2px 0 4px; gap: 4px; }
    }

    /* ── Controls ─────────────────────────────────────────── */
    #controls {
      display:flex; flex-direction:column; align-items:center;
      gap:10px; padding:10px 24px max(20px, env(safe-area-inset-bottom)); flex-shrink:0;
      border-top:1px solid var(--border);
      background:rgba(10,10,20,0.7); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    }

    #mic-wrapper { position:relative; display:flex; align-items:center; justify-content:center; }

    .ring { position:absolute; border-radius:50%; border:2px solid var(--green); opacity:0; transition:opacity 0.2s; }
    .ring-1 { width:82px;  height:82px; }
    .ring-2 { width:100px; height:100px; }
    .ring-3 { width:118px; height:118px; }
    #mic-wrapper.listening .ring { opacity:0.4; animation:pulse-ring 1.5s ease-out infinite; }
    #mic-wrapper.listening .ring-1 { animation-delay:0s; }
    #mic-wrapper.listening .ring-2 { animation-delay:0.3s; }
    #mic-wrapper.listening .ring-3 { animation-delay:0.6s; }
    @keyframes pulse-ring { 0%{transform:scale(0.85);opacity:0.45} 100%{transform:scale(1.15);opacity:0} }

    #mic-btn {
      width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:26px; position:relative; z-index:1;
      background:var(--bg-card); border:2px solid var(--border); color:var(--text-dim);
      transition:background var(--tr), border-color var(--tr), transform 0.12s;
      -webkit-tap-highlight-color:transparent; user-select:none;
    }
    #mic-btn:active { transform:scale(0.9); }
    #mic-btn.listening { background:rgba(0,230,118,0.12); border-color:var(--green); color:var(--green); }

    #hint { font-size:11px; color:var(--text-dim); text-align:center; }

    /* ── Text input row ───────────────────────────────────── */
    #text-row {
      display:flex; align-items:center; gap:8px; width:100%;
    }
    #text-input {
      flex:1; background:var(--bg-card); border:1px solid var(--border);
      border-radius:22px; padding:10px 16px; font-size:15px;
      color:var(--text); outline:none; font-family:inherit;
      -webkit-appearance:none;
    }
    #text-input::placeholder { color:var(--text-dim); }
    #text-input:focus { border-color:var(--primary); }
    #send-btn {
      width:40px; height:40px; border-radius:50%; border:none; cursor:pointer;
      background:var(--primary); color:#fff; font-size:18px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent;
    }
    #send-btn:active { opacity:0.75; transform:scale(0.92); }

    /* ── Clear button ─────────────────────────────────────── */
    #clear-btn {
      position:absolute; top:14px; right:18px;
      background:none; border:1px solid var(--border); color:var(--text-dim);
      font-size:11px; padding:3px 10px; border-radius:20px; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    #clear-btn:active { opacity:0.6; }
  </style>
</head>
<body>
<script>
  // iOS Safari viewport height fix — must run before layout
  function setVH() {
    document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
  }
  setVH();
  window.addEventListener('resize', setVH);
  window.addEventListener('orientationchange', () => setTimeout(setVH, 200));
</script>
<div id="app">

  <!-- Header -->
  <div id="header">
    <h1>🎙️ AI Assistant</h1>
    <span id="lang-badge">—</span>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div id="status-pill">
      <span id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <!-- Avatar -->
  <div id="avatar-section">
    <div id="avatar-ring">
      <div class="a-ring a-ring-1"></div>
      <div class="a-ring a-ring-2"></div>
      <div class="a-ring a-ring-3"></div>

      <canvas id="avatar-canvas" width="280" height="380"></canvas>

      <!-- Upload overlay (visible until photo chosen) -->
      <div id="photo-overlay">
        <span class="icon">📷</span>
        <span class="label">Tap to set photo</span>
      </div>

      <!-- Change photo after upload -->
      <button id="change-photo-btn" aria-label="Change photo">✎</button>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="photo-input" accept="image/*" style="display:none" />
  </div>

  <!-- Error -->
  <div id="error-banner"></div>

  <!-- Transcript -->
  <div id="transcript">
    <div id="interim-msg"></div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <div id="mic-wrapper">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <button id="mic-btn" aria-label="Tap to talk">🎤</button>
    </div>
    <div id="hint">Tap mic to talk · or type below</div>
    <div id="text-row">
      <input id="text-input" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="send-btn" aria-label="Send">➤</button>
    </div>
  </div>

  <button id="clear-btn">Clear</button>

</div>

<script>
// ══════════════════════════════════════════════════════════════
//  AI Voice Chatbot — v3  (Groq Llama 3.3 70B + Fish Audio)
// ══════════════════════════════════════════════════════════════

/* ── State ─────────────────────────────────────────────────── */
let recognition        = null;
let audioCtx           = null;
let analyser           = null;
let micStream          = null;
let chatController     = null;
let isAISpeaking       = false;
let isListening        = false;
let history            = [];
let detectedLang       = 'en';

// Avatar
let avatarImg          = null;   // HTMLImageElement
let avatarAnimRAF      = null;
let faceMouth          = null;   // detected mouth region { topY, bottomY, leftX, rightX } normalized 0–1
let mouthSkinColor     = null;   // sampled skin color { r, g, b } from mouth area

/* ── localStorage persistence ──────────────────────────────── */
const STORAGE_KEY = 'ai_chat_history';

function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  } catch {}
}

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (!Array.isArray(parsed) || parsed.length === 0) return;
    history = parsed;
    // Rebuild transcript UI from saved history
    parsed.forEach(m => addMessage(m.role === 'user' ? 'user' : 'ai', m.content));
    // Restore language badge from last message
    const lastMsg = parsed[parsed.length - 1];
    if (lastMsg) setLang(detectLang(lastMsg.content));
  } catch {}
}

/* ── DOM refs ──────────────────────────────────────────────── */
const micBtn        = document.getElementById('mic-btn');
const micWrapper    = document.getElementById('mic-wrapper');
const statusPill    = document.getElementById('status-pill');
const statusText    = document.getElementById('status-text');
const transcriptEl  = document.getElementById('transcript');
const interimMsg    = document.getElementById('interim-msg');
const langBadge     = document.getElementById('lang-badge');
const errorBanner   = document.getElementById('error-banner');
const clearBtn      = document.getElementById('clear-btn');
const avatarRing    = document.getElementById('avatar-ring');
const avatarCanvas  = document.getElementById('avatar-canvas');
const photoOverlay  = document.getElementById('photo-overlay');
const changeBtn     = document.getElementById('change-photo-btn');
const photoInput    = document.getElementById('photo-input');
const avatarCtx     = avatarCanvas.getContext('2d');
const textInput     = document.getElementById('text-input');
const sendBtn       = document.getElementById('send-btn');

/* ── Status ────────────────────────────────────────────────── */
function setStatus(state) {
  const labels = { idle:'Ready', listening:'Listening…', thinking:'Thinking…', speaking:'Speaking…' };
  statusPill.className = state;
  statusText.textContent = labels[state] || state;
  avatarRing.className = state === 'idle' ? '' : state;
  // Disable text input while busy
  const busy = state !== 'idle';
  textInput.disabled = busy;
  sendBtn.disabled   = busy;
  sendBtn.style.opacity = busy ? '0.4' : '1';
}

/* ── Language ──────────────────────────────────────────────── */
function detectLang(text) { return /[؀-ۿݐ-ݿ]/.test(text) ? 'ar' : 'en'; }
function setLang(lang) {
  detectedLang = lang;
  langBadge.textContent = lang === 'ar' ? 'عربي 🔁' : 'EN 🔁';
  langBadge.className = lang;
  if (recognition) recognition.lang = lang === 'ar' ? 'ar-SA' : 'en-US';
}

// Tap badge to toggle language manually
langBadge.addEventListener('click', () => {
  setLang(detectedLang === 'ar' ? 'en' : 'ar');
});

// Set default to English
setLang('en');

/* ── Error ─────────────────────────────────────────────────── */
function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
  setTimeout(() => { errorBanner.style.display = 'none'; }, 5000);
}

/* ── Transcript ────────────────────────────────────────────── */
function addMessage(role, text) {
  const lang = detectLang(text);
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  if (lang === 'ar') { bubble.dir = 'rtl'; bubble.setAttribute('lang', 'ar'); }
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  transcriptEl.insertBefore(wrap, interimMsg);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function setInterim(text) {
  interimMsg.textContent = text;
  interimMsg.style.display = text ? 'block' : 'none';
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

/* ══════════════════════════════════════════════════════════
   AVATAR  —  Canvas rendering + mouth animation
   ══════════════════════════════════════════════════════════ */

const AVATAR_W = 280;
const AVATAR_H = 380;

function drawAvatarFrame(amplitude) {
  avatarCtx.clearRect(0, 0, AVATAR_W, AVATAR_H);

  // Clip to rounded rectangle
  avatarCtx.save();
  avatarCtx.beginPath();
  const r = 28;
  avatarCtx.moveTo(r, 0);
  avatarCtx.lineTo(AVATAR_W - r, 0);
  avatarCtx.quadraticCurveTo(AVATAR_W, 0, AVATAR_W, r);
  avatarCtx.lineTo(AVATAR_W, AVATAR_H - r);
  avatarCtx.quadraticCurveTo(AVATAR_W, AVATAR_H, AVATAR_W - r, AVATAR_H);
  avatarCtx.lineTo(r, AVATAR_H);
  avatarCtx.quadraticCurveTo(0, AVATAR_H, 0, AVATAR_H - r);
  avatarCtx.lineTo(0, r);
  avatarCtx.quadraticCurveTo(0, 0, r, 0);
  avatarCtx.closePath();
  avatarCtx.clip();

  if (!avatarImg) {
    avatarCtx.fillStyle = 'rgba(108,99,255,0.08)';
    avatarCtx.fillRect(0, 0, AVATAR_W, AVATAR_H);
    avatarCtx.restore();
    return;
  }

  const iW = avatarImg.naturalWidth;
  const iH = avatarImg.naturalHeight;

  // Always draw the full photo — never cut or split it
  avatarCtx.drawImage(avatarImg, 0, 0, iW, iH, 0, 0, AVATAR_W, AVATAR_H);

  // When speaking: overlay a skin-toned gradient mouth shape
  if (isAISpeaking && amplitude > 0.03) {
    const cx    = AVATAR_W * (faceMouth ? (faceMouth.leftX + faceMouth.rightX) / 2     : 0.50);
    const cy    = AVATAR_H * (faceMouth ? faceMouth.centerY                            : 0.63);
    const rx    = AVATAR_W * (faceMouth ? (faceMouth.rightX - faceMouth.leftX) * 0.36  : 0.09);
    const openH = AVATAR_H * (faceMouth ? (faceMouth.bottomY - faceMouth.topY) * 1.0   : 0.042);
    const ry    = Math.max(1, openH * Math.min(amplitude, 1));

    // Radial gradient: dark center → blends into skin tone at edges (no harsh border)
    const grad = avatarCtx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry) * 1.1);
    if (mouthSkinColor) {
      const { r, g, b } = mouthSkinColor;
      grad.addColorStop(0,    `rgba(${(r*0.12)|0}, ${(g*0.08)|0}, ${(b*0.08)|0}, 0.96)`);
      grad.addColorStop(0.55, `rgba(${(r*0.30)|0}, ${(g*0.20)|0}, ${(b*0.20)|0}, 0.75)`);
      grad.addColorStop(1,    `rgba(${r}, ${g}, ${b}, 0)`);
    } else {
      grad.addColorStop(0,    'rgba(18, 5, 5, 0.93)');
      grad.addColorStop(0.6,  'rgba(40, 15, 15, 0.5)');
      grad.addColorStop(1,    'rgba(60, 25, 25, 0)');
    }

    avatarCtx.save();
    avatarCtx.scale(1, ry / rx); // squash circle into ellipse
    avatarCtx.beginPath();
    avatarCtx.arc(cx, cy * (rx / ry), rx, 0, Math.PI * 2);
    avatarCtx.fillStyle = grad;
    avatarCtx.fill();
    avatarCtx.restore();
  }

  avatarCtx.restore();
}

// Animation loop
const ampArr  = new Uint8Array(128);
let ttsPhase  = 0;
function avatarLoop() {
  let amp = 0;
  if (isAISpeaking && ttsAnalyser) {
    // Real amplitude from ElevenLabs audio
    ttsAnalyser.getByteFrequencyData(ampArr);
    let sum = 0;
    for (let i = 1; i < 20; i++) sum += ampArr[i];
    amp = Math.min(1, (sum / (19 * 255)) * 4);
  } else if (isAISpeaking) {
    // Simulated fallback when no analyser
    ttsPhase += 0.07;
    amp = 0.35 + 0.35 * Math.sin(ttsPhase) + 0.12 * Math.sin(ttsPhase * 2.5 + 1);
    amp = Math.max(0.02, Math.min(1, amp));
  } else if (analyser) {
    analyser.getByteFrequencyData(ampArr);
    let sum = 0;
    for (let i = 4; i < 32; i++) sum += ampArr[i];
    amp = sum / (28 * 255);
  }
  drawAvatarFrame(amp);
  avatarAnimRAF = requestAnimationFrame(avatarLoop);
}

/* ── Face detection ─────────────────────────────────────────── */
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
let faceModelsLoaded = false;

async function loadFaceModels() {
  if (faceModelsLoaded) return;
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL)
    ]);
    faceModelsLoaded = true;
  } catch (e) {
    console.warn('Face model load failed, using heuristic mouth position', e);
  }
}

async function detectMouth(img) {
  if (!faceModelsLoaded) return null;
  try {
    const det = await faceapi
      .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks(true); // true = use tiny net
    if (!det) return null;
    const pts = det.landmarks.positions;
    const iW  = img.naturalWidth;
    const iH  = img.naturalHeight;
    // Outer lips: 48-59, inner: 60-67
    const mouthPts = pts.slice(48, 68);
    const xs = mouthPts.map(p => p.x / iW);
    const ys = mouthPts.map(p => p.y / iH);
    return {
      leftX:   Math.min(...xs),
      rightX:  Math.max(...xs),
      topY:    Math.min(...ys),
      bottomY: Math.max(...ys),
      centerY: (Math.min(...ys) + Math.max(...ys)) / 2
    };
  } catch (e) {
    console.warn('Face detect error:', e);
    return null;
  }
}

/* ── Photo upload + localStorage persistence ────────────────── */
const PHOTO_KEY = 'ai_avatar_photo';

function savePhotoToStorage(img) {
  try {
    // Compress to JPEG, max 600px wide, to stay within localStorage limits
    const maxW  = 600;
    const scale = Math.min(1, maxW / img.naturalWidth);
    const w = Math.round(img.naturalWidth  * scale);
    const h = Math.round(img.naturalHeight * scale);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    localStorage.setItem(PHOTO_KEY, c.toDataURL('image/jpeg', 0.75));
  } catch (e) { console.warn('Could not save photo to storage:', e); }
}

function sampleMouthSkinColor(img, mouth) {
  try {
    const tmp = document.createElement('canvas');
    tmp.width = AVATAR_W; tmp.height = AVATAR_H;
    const c = tmp.getContext('2d');
    c.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, 0, 0, AVATAR_W, AVATAR_H);
    const cx = Math.round(AVATAR_W * (mouth.leftX + mouth.rightX) / 2);
    const cy = Math.round(AVATAR_H * mouth.topY) - 6; // sample just above lips
    const px = c.getImageData(Math.max(0, cx - 10), Math.max(0, cy - 6), 20, 12).data;
    let r = 0, g = 0, b = 0, n = 0;
    for (let i = 0; i < px.length; i += 4) { r += px[i]; g += px[i+1]; b += px[i+2]; n++; }
    return { r: (r/n)|0, g: (g/n)|0, b: (b/n)|0 };
  } catch { return null; }
}

async function applyPhoto(img) {
  avatarImg = img;
  photoOverlay.classList.add('hidden');
  changeBtn.classList.add('visible');
  drawAvatarFrame(0);
  await loadFaceModels();
  faceMouth = await detectMouth(img);
  if (faceMouth) mouthSkinColor = sampleMouthSkinColor(img, faceMouth);
}

function loadPhoto(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    savePhotoToStorage(img);
    applyPhoto(img);
  };
  img.onerror = () => showError('Could not load image. Try a different file.');
  img.src = url;
}

function loadSavedPhoto() {
  try {
    const data = localStorage.getItem(PHOTO_KEY);
    if (!data) return;
    const img = new Image();
    img.onload = () => applyPhoto(img);
    img.src = data;
  } catch (e) {}
}

// Pre-load face models + restore saved photo on startup
loadFaceModels();
loadSavedPhoto();

photoOverlay.addEventListener('click', () => photoInput.click());
avatarCanvas.addEventListener('click', () => { if (!avatarImg) photoInput.click(); });
changeBtn.addEventListener('click', () => photoInput.click());
photoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) loadPhoto(file);
  photoInput.value = ''; // reset so same file can be re-selected
});

// Initial placeholder draw
drawAvatarFrame(0);

/* ══════════════════════════════════════════════════════════
   WEB AUDIO — Mic capture + VAD
   ══════════════════════════════════════════════════════════ */

const VAD_THRESHOLD  = 22;   // 0–255 average energy to trigger interrupt
const VAD_COOLDOWN   = 700;  // ms after AI starts speaking before interrupt enabled
let   vadCooldownUntil = 0;

async function initAudio() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.65;
    src.connect(analyser);

    startVAD();
    if (!avatarAnimRAF) avatarLoop(); // start avatar animation
    return true;
  } catch (err) {
    showError('Microphone access denied. Please allow microphone and reload.');
    return false;
  }
}

const vadArr = new Uint8Array(128);
function startVAD() {
  function tick() {
    analyser.getByteFrequencyData(vadArr);
    const avg = vadArr.reduce((a, b) => a + b, 0) / vadArr.length;

    // Interrupt: user speaks while AI is talking
    if (isAISpeaking && Date.now() > vadCooldownUntil && avg > VAD_THRESHOLD) {
      interruptAI();
      startListening();
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ── Interrupt ─────────────────────────────────────────────── */
function interruptAI() {
  if (ttsController)  { ttsController.abort(); ttsController = null; }
  if (chatController) { chatController.abort(); chatController = null; }
  if (currentAudio)   { currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  ttsAnalyser  = null;
  isAISpeaking = false;
  setStatus('idle');
}

/* ══════════════════════════════════════════════════════════
   SPEECH RECOGNITION (STT)
   ══════════════════════════════════════════════════════════ */

function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('Speech recognition not supported. Use Chrome or Safari.');
    return false;
  }

  recognition = new SR();
  recognition.continuous      = false;
  recognition.interimResults  = true;
  recognition.lang            = 'en-US'; // start English; switches to ar-SA after Arabic detected
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const last  = e.results[e.results.length - 1];
    const text  = last[0].transcript.trim();
    if (last.isFinal) {
      setInterim('');
      if (text) handleUserInput(text);
    } else {
      setInterim(text);
    }
  };

  recognition.onend = () => {
    if (isListening) {
      isListening = false;
      setMicState(false);
      if (statusPill.className === 'listening') setStatus('idle');
    }
  };

  recognition.onerror = (e) => {
    isListening = false;
    setMicState(false);
    setStatus('idle');
    if (e.error === 'aborted') return;
    if (e.error === 'no-speech') { showError('No speech detected — try again'); return; }
    if (e.error === 'not-allowed') { showError('Microphone permission denied — allow it in browser settings'); return; }
    showError(`Mic error: ${e.error}`);
  };

  return true;
}

function setMicState(on) {
  micBtn.classList.toggle('listening', on);
  micWrapper.classList.toggle('listening', on);
}

function startListening() {
  if (isListening || isAISpeaking) return;
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  try {
    recognition.start();
    isListening = true;
    setMicState(true);
    setStatus('listening');
  } catch (err) {
    console.error('STT start error:', err);
    showError('Mic error: ' + (err.message || err));
    isListening = false;
    setMicState(false);
    setStatus('idle');
  }
}

function stopListening() {
  if (!isListening) return;
  recognition.stop();
  isListening = false;
  setMicState(false);
  setInterim('');
}

/* ══════════════════════════════════════════════════════════
   MAIN PIPELINE — input → Groq → ElevenLabs → audio
   ══════════════════════════════════════════════════════════ */

async function handleUserInput(text) {
  if (!text.trim()) return;

  const lang = detectLang(text);
  setLang(lang);

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  saveHistory();

  setMicState(false);
  setStatus('thinking');

  let aiText = '';

  try {
    // ── Step 1: Gemini streaming ────────────────────────────
    chatController = new AbortController();
    const chatRes  = await fetch('/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: history.slice(-12), lang }),
      signal:  chatController.signal
    });

    if (!chatRes.ok) throw new Error(`Chat API ${chatRes.status}`);

    // Read SSE stream
    const reader = chatRes.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]' || raw.startsWith('[ERROR]')) continue;
        try {
          const parsed = JSON.parse(raw);
          const delta  = parsed.choices?.[0]?.delta?.content || '';
          aiText += delta;
        } catch {}
      }
    }

    if (!aiText) throw new Error('Empty response from AI');

    history.push({ role: 'assistant', content: aiText });
    addMessage('ai', aiText);
    saveHistory();

    // ── Step 2: TTS — detect language from AI's response, not user's input
    const aiLang = detectLang(aiText);
    setStatus('speaking');
    isAISpeaking    = true;
    vadCooldownUntil = Date.now() + VAD_COOLDOWN;

    await playTTS(aiText, aiLang);

  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error(err);
    showError('Something went wrong. Please try again.');
    setStatus('idle');
    isAISpeaking = false;
  }
}

/* ── TTS Playback — ElevenLabs (your cloned voice, free tier) ── */
let currentAudio = null;
let ttsController = null;
let ttsAnalyser   = null;

async function playTTS(text, lang) {
  ttsController = new AbortController();
  ttsAnalyser   = null;

  try {
    const res = await fetch('/api/tts', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ text, lang }),
      signal:  ttsController.signal
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(`TTS ${res.status}: ${err.detail || err.error || ''}`);
    }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);

    await new Promise((resolve) => {
      currentAudio = new Audio(url);

      // Connect to Web Audio API for real amplitude → drives lip sync
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const src   = audioCtx.createMediaElementSource(currentAudio);
        ttsAnalyser = audioCtx.createAnalyser();
        ttsAnalyser.fftSize = 256;
        src.connect(ttsAnalyser);
        src.connect(audioCtx.destination);
      } catch (_) { /* fallback: play without analyser */ }

      const cleanup = () => {
        URL.revokeObjectURL(url);
        currentAudio = null; ttsAnalyser = null;
        isAISpeaking = false; setStatus('idle');
        resolve();
      };
      currentAudio.onended = cleanup;
      currentAudio.onerror = cleanup;
      currentAudio.play().catch(cleanup);
    });

  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error('[TTS]', err.message);
    // Graceful fallback to browser TTS
    await playTTSFallback(text, lang);
  } finally {
    ttsController = null; ttsAnalyser = null;
  }
}

/* ── Fallback: browser TTS if ElevenLabs key not set ────────── */
function playTTSFallback(text, lang) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { isAISpeaking = false; setStatus('idle'); resolve(); return; }
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = lang === 'ar' ? 'ar-SA' : 'en-US';
    utt.rate  = 0.92;
    const done = () => { isAISpeaking = false; setStatus('idle'); resolve(); };
    utt.onend = done;
    utt.onerror = (e) => { if (e.error !== 'interrupted') console.error('TTS fallback:', e.error); done(); };
    speechSynthesis.speak(utt);
    setTimeout(done, 30000); // safety
  });
}

/* ── Mic button ─────────────────────────────────────────────── */
let speechUnlocked = false;
function unlockSpeech() {
  // Mobile requires speechSynthesis triggered synchronously inside a user gesture
  if (speechUnlocked || !window.speechSynthesis) return;
  speechUnlocked = true;
  const utt = new SpeechSynthesisUtterance('.');
  utt.volume = 0.01;
  utt.rate   = 10;   // speak fast so it ends instantly
  speechSynthesis.speak(utt);
  // Do NOT cancel — let it finish; canceling immediately can break the unlock
}

micBtn.addEventListener('click', () => {
  unlockSpeech();
  if (isAISpeaking) { interruptAI(); return; }
  if (isListening) { stopListening(); return; }
  startListening();
});

/* ── Clear ──────────────────────────────────────────────────── */
clearBtn.addEventListener('click', () => {
  history = [];
  localStorage.removeItem(STORAGE_KEY);
  transcriptEl.querySelectorAll('.msg').forEach(m => m.remove());
  setInterim('');
  interruptAI();
  setStatus('idle');
  langBadge.textContent = '—';
  langBadge.className   = '';
});

/* ── Text input send ────────────────────────────────────────── */
function sendText() {
  const text = textInput.value.trim();
  if (!text || isAISpeaking) return;
  textInput.value = '';
  unlockSpeech();
  handleUserInput(text);
}
sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

/* ── Space bar shortcut ─────────────────────────────────────── */
document.addEventListener('keydown', async (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    micBtn.click();
  }
});

/* ── Wake lock (keep screen on) ─────────────────────────────── */
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch {}
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

/* ── Init ───────────────────────────────────────────────────── */
initSTT();
setStatus('idle');
loadHistory();
avatarLoop(); // start avatar animation immediately
</script>
